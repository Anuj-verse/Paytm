  build-and-push:
    # needs: analyse
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v3

      - name: Validate registry endpoint
        env:
          RAW_REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
        run: |
          REGISTRY="${RAW_REGISTRY#http://}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY%/}"   # remove trailing slash
          echo "Checking registry: ${REGISTRY}"
          
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "https://${REGISTRY}/v2/")
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ]; then
            echo "Registry endpoint check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Login to Nexus
        uses: docker/login-action@v2
        with: 
          registry: ${{ secrets.NEXUS_REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}
      
      - name: Build and Push backend
        env:
          RAW_REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
        run: |
          REGISTRY="${RAW_REGISTRY#http://}"
          REGISTRY="${REGISTRY#https://}"
          docker build -t ${REGISTRY}/backend:latest ./backend
          docker push ${REGISTRY}/backend:latest
        
      - name: Build and Push frontend
        env:
          RAW_REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
        run: |
          REGISTRY="${RAW_REGISTRY#http://}"
          REGISTRY="${REGISTRY#https://}"
          docker build \
            --build-arg VITE_API_URL=http://${{ secrets.EC2_HOST }}:5000 \
            -t ${REGISTRY}/frontend:latest ./frontend
          docker push ${REGISTRY}/frontend:latest


