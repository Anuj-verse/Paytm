version: "3.8"

services:

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@${MONGO_CLUSTER}/
      MONGO_DB_NAME: ${MONGO_DB_NAME}

    depends_on: 
     - mongodb

  frontend:
    build: ./frontend
    container_name: frontend
    ports: 
     - "5173:80"
    depends_on:
     - backend

volumes:
  mongo-data: